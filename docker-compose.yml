services:
  web:
    build: ./apps/web
    restart: unless-stopped
    env_file:
      - ./apps/web/.env
    depends_on:
      - db
    expose:
      - "3000"
    volumes:
      - uploads_data:/app/public/uploads

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: museu
      POSTGRES_PASSWORD: museu
      POSTGRES_DB: museu
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - web

volumes:
  db_data:
  caddy_data:
  uploads_data:
